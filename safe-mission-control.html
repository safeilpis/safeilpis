function saveSubtask(mid, parentId, sid){
  const name = $('#f-name').value.trim();
  if(!name){ toast('Informe o nome da subtarefa'); return; }
  const start = $('#f-start').value || todayISO();
  const dur = Math.max(0, Number($('#f-dur').value)||0);
  const end = $('#f-end').value || addDays(start, dur);
  mutate(()=>{
    const m = S.milestones.find(x=>x.id===mid);
    const data = { name, description:$('#f-desc').value.trim(), startDate:start, plannedDuration:dur,
      expectedEnd:end, priority:$('#f-prio').value, status:$('#f-status').value, notes:$('#f-notes').value.trim(), difficulty:_fDiff };
    if (sid){
      const s = (findTask(m.subtasks, sid)||{}).node; if (!s) return;
      const wasDone = s.status === 'Concluída';
      Object.assign(s, data);
      if (s.status==='Concluída' && !wasDone) setTaskDone(s, true);
      if (s.status!=='Concluída') s.completedAt = null;
      applyBottleneck(s);
    } else {
      const t = { id:uid(), ...data, children:[], completedAt: data.status==='Concluída' ? todayISO() : null };
      if (parentId){
        const p = (findTask(m.subtasks, parentId)||{}).node;
        if (p){ p.children = p.children||[]; p.children.push(t); }
        else m.subtasks.push(t);
      } else m.subtasks.push(t);
      if (m.status==='Não iniciada' && data.status!=='Não iniciada') m.status='Em andamento';
      applyBottleneck(t);
    }
    syncTaskTree(m.subtasks);
    if (sid){
      const r2 = findTask(m.subtasks, sid);
      if (r2) rechainSiblings(r2.siblings, r2.siblings.indexOf(r2.node)); /* cascade from the edited task */
    }
  });
  closeModal(); toast(sid?'Subtarefa atualizada':'Subtarefa criada');
}
function deleteSubtask(mid, sid){
  if(!confirm('Excluir esta subtarefa e todas as subtarefas aninhadas dela?')) return;
  mutate(()=>{
    const m = S.milestones.find(x=>x.id===mid);
    removeTask(m.subtasks, sid);
    chainKids({ startDate: m.startDate, children: m.subtasks }); /* close the sequential gap */
    syncTaskTree(m.subtasks);
  });
  closeModal(); toast('Subtarefa excluída');
}

function openHabitForm(id){
  const h = id ? S.habits.find(x=>x.id===id) : null;
  openModal(`
    <div class="modal-title">${h?'Editar hábito':'Novo hábito'}</div>
    <div class="field"><label>Nome do hábito</label><input id="f-name" value="${h?esc(h.name):''}" placeholder="Ex.: Acordar às 04:15"></div>
    <div class="btn-row">
      <button class="btn btn-primary btn-block" onclick="saveHabit('${id||''}')">${h?'Salvar':'Criar hábito'}</button>
    </div>
    ${h?`<button class="btn btn-danger btn-block" style="margin-top:8px" onclick="deleteHabit('${id}')">Excluir hábito</button>`:''}
    <button class="btn btn-ghost btn-block" style="margin-top:8px" onclick="closeModal()">Cancelar</button>`);
}
function saveHabit(id){
  const name = $('#f-name').value.trim();
  if(!name){ toast('Informe o nome do hábito'); return; }
  mutate(()=>{
    if(id){ S.habits.find(x=>x.id===id).name = name; }
    else S.habits.push({ id:uid(), name, history:{} });
  });
  closeModal(); toast(id?'Hábito atualizado':'Hábito criado');
}
function deleteHabit(id){
  if(!confirm('Excluir este hábito e todo o histórico dele?')) return;
  mutate(()=>{ S.habits = S.habits.filter(x=>x.id!==id); });
  closeModal(); toast('Hábito excluído');
}

/* ---------- BACKUP ---------- */
function exportBackup(){
  const blob = new Blob([JSON.stringify(S, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `safe-mission-control-backup-${todayISO()}.json`;
  a.click(); URL.revokeObjectURL(a.href);
  toast('Backup exportado');
}
function importBackup(input){
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (!data.milestones || !data.habits) throw new Error('estrutura inválida');
      if (!confirm('Importar este backup substituirá todos os dados atuais. Continuar?')) return;
      S = migrate(data); persist(); render(); toast('Backup restaurado com sucesso');
    } catch(e){ toast('Arquivo de backup inválido'); }
  };
  reader.readAsText(file);
  input.value = '';
}

/* ---------- NAVIGATION & RENDER ---------- */
function nav(view){
  currentView = view;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  $('#view-'+view).classList.add('active');
  document.querySelectorAll('[data-nav]').forEach(b=>b.classList.toggle('active', b.dataset.nav===view));
  window.scrollTo({top:0});
  render();
}
document.querySelectorAll('[data-nav]').forEach(b=>b.addEventListener('click', ()=>nav(b.dataset.nav)));

function render(){
  ({ dashboard:renderDashboard, roadmap:renderRoadmap, hoje:renderHoje, rotina:renderRotina, kpis:renderKpis, caixa:renderCaixa, clinicas:renderClinicas })[currentView]();
}

/* Re-evaluate schedule drift automatically at every day change */
let _lastDay = todayISO();
setInterval(()=>{ const t = todayISO(); if (t !== _lastDay){ _lastDay = t; render(); } }, 60000);

/* ---------- LIVE COUNTDOWN (real-time seconds) ---------- */
function tickCountdown(){
  if (!S || !S.targetDate) return;
  const line = document.getElementById('cd-line');
  if (!line) return; /* countdown only lives on the Dashboard */
  const target = pISO(S.targetDate); target.setHours(23,59,59,999);
  let ms = target - Date.now();
  const over = ms < 0; if (over) ms = -ms;
  /* decomposition: months = fixed 30-day blocks */
  let sec = Math.floor(ms/1000);
  const months = Math.floor(sec / 2592000); sec -= months * 2592000;
  const days = Math.floor(sec / 86400);    sec -= days * 86400;
  const parts = [];
  if (months) parts.push(months + (months===1 ? ' mês' : ' meses'));
  if (months || days) parts.push(days + (days===1 ? ' dia' : ' dias'));
  parts.push(sec + ' s');
  line.textContent = parts.join(' · ');
  const ov = document.getElementById('cd-over'), cd = document.getElementById('countdown'), hint = document.getElementById('cd-hint');
  if (ov) ov.style.display = over ? 'block' : 'none';
  if (cd) cd.classList.toggle('over', over);
  if (hint) hint.textContent = over ? 'Tempo decorrido desde o prazo final da missão.' : 'Tempo restante até o prazo final da missão.';
}
setInterval(tickCountdown, 1000);

/* ---------- INIT ---------- */
(async function init(){
  await StorageAdapter.initCloud();          /* optional: silently no-ops when offline */
  const saved = await StorageAdapter.load();
  S = migrate(saved) || defaultState();
  if (!saved) persist();
  nav('hoje');

  /* Cross-device sync: pull newer cloud state when the tab refocuses or every 60s,
     but never while a local edit is still pending (avoids clobbering in-progress work). */
  async function syncPull(){
    if (_saveTimer) return;                   /* unsaved local edit in flight */
    const fresh = await StorageAdapter.pullIfNewer();
    if (fresh){ S = migrate(fresh); render(); }
  }
  document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') syncPull(); });
  setInterval(syncPull, 60000);
})();
</script>
